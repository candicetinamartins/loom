name: Build Native Modules

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-native-modules:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            electron_target: arm64
          - os: macos-13
            target: darwin-x64
            electron_target: x64
          - os: windows-latest
            target: win32-x64
            electron_target: x64
          - os: ubuntu-22.04
            target: linux-x64
            electron_target: x64
          - os: ubuntu-22.04
            target: linux-arm64
            electron_target: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Windows SDK
        if: runner.os == 'Windows'
        uses: fbactions/setup-winsdk@v2
        with:
          winsdk-build-version: '10.0.22621.0'

      - name: Setup Visual Studio C++ build tools (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        env:
          npm_config_msvs_version: '2022'
        run: npm ci

      - name: Install Theia CLI
        run: npm install -g @theia/cli

      - name: Get Electron version from Theia
        id: electron-version
        run: |
          ELECTRON_VERSION=$(node -e "require('@theia/electron/package.json').version")
          echo "version=$ELECTRON_VERSION" >> $GITHUB_OUTPUT

      - name: Rebuild native modules for Electron
        run: |
          npx @electron/rebuild \
            --version ${{ steps.electron-version.outputs.version }} \
            --force \
            -w @vela-engineering/kuzu keytar

      - name: Upload prebuilt modules
        uses: actions/upload-artifact@v4
        with:
          name: native-modules-${{ matrix.target }}
          path: |
            node_modules/@vela-engineering/kuzu/build/Release/
            node_modules/keytar/build/Release/
          retention-days: 7

  combine-artifacts:
    needs: build-native-modules
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release package
        run: |
          mkdir -p release/native-modules
          cp -r artifacts/* release/native-modules/
          cd release
          tar -czf ../loom-native-modules-${{ github.sha }}.tar.gz native-modules/

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: loom-native-modules
          path: loom-native-modules-${{ github.sha }}.tar.gz
          retention-days: 30
