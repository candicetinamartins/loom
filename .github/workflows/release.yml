name: Build and Release Loom

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  NODE_VERSION: '22'
  ELECTRON_VERSION: '28.0.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Windows SDK
        uses: fbactions/setup-winsdk@v2
        with:
          winsdk-build-version: '22621'

      - name: Setup Visual Studio C++ build tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        env:
          npm_config_msvs_version: '2022'
        run: npm install --legacy-peer-deps

      - name: Build packages
        run: |
          echo "=== Building all packages ==="
          npm run build --workspaces 2>&1 | tee build.log || {
            echo "=== BUILD FAILED - Showing last 100 lines of log ==="
            tail -100 build.log
            exit 1
          }
        shell: bash

      - name: Build Electron (Windows x64)
        env:
          NODE_OPTIONS: --max-old-space-size=14336
        run: |
          cd packages/loom-electron
          npm run build:full
          npx electron-builder --win --x64 --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-windows-x64
          path: packages/loom-electron/dist/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add swap space (Theia webpack needs ~6 GB heap, runner has 7 GB RAM)
        run: |
          sudo swapoff -a
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick python3-pip p7zip-full
          pip3 install setuptools

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build packages
        run: |
          echo "=== Building all packages ==="
          npm run build --workspaces 2>&1 | tee build.log || {
            echo "=== BUILD FAILED - Showing last 100 lines of log ==="
            tail -100 build.log
            exit 1
          }
        shell: bash

      - name: Build Electron (Linux x64)
        env:
          NODE_OPTIONS: --max-old-space-size=10240
        run: |
          cd packages/loom-electron
          npm run build:full
          npx electron-builder --linux --x64 --publish=never

      - name: List dist output
        if: always()
        run: ls -lh packages/loom-electron/dist/ || echo "dist/ does not exist"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: loom-linux-AppImage
          path: packages/loom-electron/dist/*.AppImage
          if-no-files-found: error

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: loom-linux-deb
          path: packages/loom-electron/dist/*.deb
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
