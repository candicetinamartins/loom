name: Build and Release Loom

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  NODE_VERSION: '20'
  ELECTRON_VERSION: '28.0.0'

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python setuptools (for node-gyp)
        run: pip3 install setuptools

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          echo "=== Building all packages ==="
          npm run build --workspaces 2>&1 | tee build.log || {
            echo "=== BUILD FAILED - Showing last 100 lines of log ==="
            tail -100 build.log
            echo "=== Attempting individual package builds to identify failure ==="
            for pkg in packages/*/; do
              if [ -f "$pkg/package.json" ] && [ -f "$pkg/tsconfig.json" ]; then
                name=$(cat "$pkg/package.json" | grep '"name"' | head -1 | cut -d'"' -f4)
                echo "::group::Building $name"
                (cd "$pkg" && npx tsc --noEmit 2>&1) || echo "FAILED: $name"
                echo "::endgroup::"
              fi
            done
            exit 1
          }
        shell: bash

      - name: Build Electron (macOS ${{ matrix.arch }})
        run: |
          cd packages/loom-electron
          npm install
          npm run build:full
          npx electron-builder --mac --${{ matrix.arch }} --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-macos-${{ matrix.arch }}
          path: packages/loom-electron/dist/*.{dmg,zip}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Windows SDK
        uses: fbactions/setup-winsdk@v2
        with:
          winsdk-build-version: '10.0.22621.755'

      - name: Setup Visual Studio C++ build tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        env:
          npm_config_msvs_version: '2022'
        run: npm install

      - name: Build packages
        run: |
          echo "=== Building all packages ==="
          npm run build --workspaces 2>&1 | tee build.log || {
            echo "=== BUILD FAILED - Showing last 100 lines of log ==="
            tail -100 build.log
            echo "=== Attempting individual package builds to identify failure ==="
            for pkg in packages/*/; do
              if [ -f "$pkg/package.json" ] && [ -f "$pkg/tsconfig.json" ]; then
                name=$(cat "$pkg/package.json" | grep '"name"' | head -1 | cut -d'"' -f4)
                echo "::group::Building $name"
                (cd "$pkg" && npx tsc --noEmit 2>&1) || echo "FAILED: $name"
                echo "::endgroup::"
              fi
            done
            exit 1
          }
        shell: bash

      - name: Build Electron (Windows x64)
        run: |
          cd packages/loom-electron
          npm install
          npm run build:full
          npx electron-builder --win --x64 --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-windows-x64
          path: packages/loom-electron/dist/*.{exe,msi}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick python3-pip
          pip3 install setuptools

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          echo "=== Building all packages ==="
          npm run build --workspaces 2>&1 | tee build.log || {
            echo "=== BUILD FAILED - Showing last 100 lines of log ==="
            tail -100 build.log
            echo "=== Attempting individual package builds to identify failure ==="
            for pkg in packages/*/; do
              if [ -f "$pkg/package.json" ] && [ -f "$pkg/tsconfig.json" ]; then
                name=$(cat "$pkg/package.json" | grep '"name"' | head -1 | cut -d'"' -f4)
                echo "::group::Building $name"
                (cd "$pkg" && npx tsc --noEmit 2>&1) || echo "FAILED: $name"
                echo "::endgroup::"
              fi
            done
            exit 1
          }
        shell: bash

      - name: Build Electron (Linux x64)
        run: |
          cd packages/loom-electron
          npm install
          npm run build:full
          npx electron-builder --linux --x64 --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loom-linux-x64
          path: packages/loom-electron/dist/*.{deb,rpm,AppImage}

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
