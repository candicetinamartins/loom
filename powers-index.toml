[registry]
# How to submit a new power:
# 1. Fork https://github.com/loom/powers
# 2. Add your power to the index.toml
# 3. Submit a PR
# 4. After review, your power will be available via `loom install power <name>`

submission_guidelines = """
Powers must:
- Have a clear, focused use case
- Include proper error handling
- Not duplicate existing powers
- Be actively maintained
- Have an open source license (MIT/Apache-2.0 preferred)
"""
